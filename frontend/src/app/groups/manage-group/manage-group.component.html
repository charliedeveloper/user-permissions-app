<mat-card class="permissions-card">
  <div class="card-header">
    <div class="header-text">
      <mat-card-title>Manage Groups</mat-card-title>
      <mat-card-subtitle>View all available groups in the system</mat-card-subtitle>
    </div>
    <div class="card-actions">
      <button mat-raised-button class="add-perm" (click)="onAddGroup()">+ Add Group</button>
    </div>
  </div>

  <div class="table-wrap">
    <table mat-table [dataSource]="groups" class="full-width permissions-table">

      <ng-container matColumnDef="groupId">
        <th mat-header-cell *matHeaderCellDef class="table-column-header">GROUP ID</th>
        <td mat-cell *matCellDef="let row"  class="data-row">{{ row.groupId }}</td>
      </ng-container>

      <ng-container matColumnDef="groupName">
        <th mat-header-cell *matHeaderCellDef class="table-column-header">GROUP</th>
        <td mat-cell *matCellDef="let row"><code>{{ row.groupName }}</code></td>
      </ng-container>

      <ng-container matColumnDef="permissionCount">
        <th mat-header-cell *matHeaderCellDef class="table-column-header">PERMISSIONS(COUNT)</th>
        <td mat-cell *matCellDef="let row" class="data-row permission_count">
          <a href="#" (click)="$event.preventDefault(); managePermissions(row)">{{ row.permissionCount }}</a>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row">
          <button mat-stroked-button color="primary" (click)="edit(row)">Edit</button>
          <button mat-stroked-button color="warn" (click)="deactivate(row)">Delete</button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
</mat-card>

<!-- Inline overlay panel (non-MatDialog) -->
<edit-group-permissions-panel
  *ngIf="selectedGroupForPermissions"
  [group]="selectedGroupForPermissions"
  (close)="onPermissionsClosed($event)"
></edit-group-permissions-panel>
