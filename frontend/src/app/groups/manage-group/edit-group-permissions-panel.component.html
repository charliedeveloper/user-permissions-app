<div class="dialog-overlay" (click)="closePanel()">
  <div class="dialog-container" (click)="$event.stopPropagation()">
    <div class="dialog-header">
      <h2>Manage Permissions for "<span class="user-name">{{ userName }}</span>"</h2>
      <button class="close-btn" (click)="closePanel()">✕</button>
    </div>

    <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>
    <div *ngIf="errorMessage" class="alert alert-error">{{ errorMessage }}</div>

    <div class="dialog-content">
      <div class="permissions-section">
        <div class="section-header">
          <label class="section-label">🔐 Assign Group Permissions</label>
          <label class="assigned-control">
            <span class="toggle-switch small">
              <input type="checkbox" [(ngModel)]="assignedOnly" />
              <span class="toggle-slider" aria-hidden="true"></span>
            </span>
            <span class="assigned-text">Assigned only</span>
          </label>
        </div>
        <div class="quick-filter">
          <input type="text" class="quick-filter-input" placeholder="Filter permissions..." [(ngModel)]="permissionFilterText" />
        </div>

        <div class="permissions-list">
          <div *ngFor="let permission of getFilteredPermissions()" class="permission-item">
            <label class="permission-toggle">
              <span class="toggle-switch">
                <input
                  type="checkbox"
                  role="switch"
                  [attr.aria-checked]="isPermissionAssigned(permission.permissionId)"
                  [checked]="isPermissionAssigned(permission.permissionId)"
                  (change)="togglePermission(permission.permissionId)"
                />
                <span class="toggle-slider" aria-hidden="true"></span>
              </span>
              <span class="permission-name">{{ permission.permissionName }}</span>
              <span class="permission-key">({{ permission.permissionKey }})</span>
            </label>
          </div>

          <div *ngIf="allPermissions.length === 0">No permissions available.</div>
          <div *ngIf="allPermissions.length > 0 && getFilteredPermissions().length === 0">No permissions match.</div>
        </div>
      </div>
    </div>

    <div class="dialog-footer">
      <button class="btn btn-primary" (click)="saveRoles()" [disabled]="isLoading">{{ isLoading ? 'Saving...' : 'Save' }}</button>
      <button class="btn btn-secondary" (click)="closePanel()" [disabled]="isLoading">Cancel</button>
    </div>
  </div>
</div>
