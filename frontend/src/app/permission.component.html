<mat-card class="permissions-card">
  <div class="card-header">
    <div class="header-text">
      <mat-card-title>Manage Permissions</mat-card-title>
      <mat-card-subtitle>View all available permissions in the system</mat-card-subtitle>
    </div>
    <div class="card-actions">
      <button mat-raised-button class="add-perm" (click)="onAddPermission()">+ Add Permission</button>
    </div>
  </div>

  <div class="quick-filter">
            <input type="text" class="quick-filter-input" placeholder="Filter permissions..." [(ngModel)]="filterText" (input)="onFilterChange()" />
          </div>

  <div class="table-wrap">
    <table mat-table [dataSource]="permissions" class="full-width permissions-table">

      <ng-container matColumnDef="permissionId">
        <th mat-header-cell *matHeaderCellDef class="table-column-header">PERMISSION ID</th>
        <td mat-cell *matCellDef="let row"  class="data-row">{{ row.permissionId }}</td>
      </ng-container>

      <ng-container matColumnDef="permissionKey">
        <th mat-header-cell *matHeaderCellDef class="table-column-header">PERMISSION KEY</th>
        <td mat-cell *matCellDef="let row"><code>{{ row.permissionKey }}</code></td>
      </ng-container>

      <ng-container matColumnDef="permissionName">
        <th mat-header-cell *matHeaderCellDef class="table-column-header">PERMISSION NAME</th>
        <td mat-cell *matCellDef="let row" class="data-row">{{ row.permissionName }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row">
          <button mat-stroked-button color="primary" (click)="edit(row)">Edit</button>
          <button mat-stroked-button color="warn" (click)="deactivate(row)">Delete</button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
</mat-card>
