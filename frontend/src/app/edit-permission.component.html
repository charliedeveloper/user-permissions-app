<h2 mat-dialog-title class="title-edit-permission">{{ model.permissionId && model.permissionId > 0 ? 'Edit Permission' : 'Add Permission' }}</h2>
<mat-dialog-content class="dialog-content">
  <mat-form-field appearance="outline" class="full">
    <mat-label>Permission Key</mat-label>
    <input matInput [(ngModel)]="model.permissionKey" />
  </mat-form-field>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Permission Name</mat-label>
    <input matInput [(ngModel)]="model.permissionName" />
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button color="primary" (click)="save()">Save</button>
</mat-dialog-actions>
